name: build-bundle

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (leave empty for auto: 'australia-YYYYMMDD')"
        required: false
        default: ""
  schedule:
    - cron: "0 6 1 * *"
  push:
    branches: [main]
    paths:
      - "make_bundle.py"
      - "chunk.py"
      - "embed.py"
      - "pyproject.toml"
      - ".github/workflows/build-bundle.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      BUNDLE_DIR: bundle-build
      BUNDLE_REPO: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Cache HF model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-base-en-v1.5-v1
          restore-keys: hf-bge-base-en-v1.5-

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[build]"

      - name: Build bundle
        run: |
          uv run make_bundle.py \
            --branch australia \
            --output "$BUNDLE_DIR" \
            --model Xenova/bge-base-en-v1.5

      - name: Smoke test
        run: |
          uv run smoke_test.py

      - name: Compress bundle
        run: |
          tar -czf bundle.tar.gz -C "$BUNDLE_DIR" .
          ls -lh bundle.tar.gz

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            TS=$(date -u +%Y%m%d)
            echo "name=australia-${TS}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "ServiceNow RAG Bundle - ${{ steps.tag.outputs.name }}"
          body: |
            Pre-built RAG bundle for the ServiceNow Australia docs release.

            Source SHA: see `manifest.json` inside the bundle.
            Embedding model: Xenova/bge-base-en-v1.5 (ONNX, 768-dim).

            Install with:
            ```
            uv run download.py --repo ${{ env.BUNDLE_REPO }} --tag ${{ steps.tag.outputs.name }} --output ~/servicenow-rag-bundle
            ```
          files: bundle.tar.gz
          fail_on_unmatched_files: true
